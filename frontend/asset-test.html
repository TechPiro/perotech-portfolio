<!DOCTYPE html>
<html lang="en">

<head>

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;

        img {
            border: 2px solid #4770ff;
            margin: 10px;
        }
    </style>
</head>

<body>
    <h1>Testing Asset Loading</h1>

    <h2>Logo (WebP):</h2>
    <img src="assets/img/logo/logo-text.webp" alt="Logo" width="200">

    <h2>Home Icon (SVG):</h2>
    <img src="assets/img/icons/home.svg" alt="Home Icon" width="50">

    <h2>Profile Image (WebP):</h2>
    <img src="assets/img/images/profile-large.webp" alt="Profile" width="200">
